name: MobileMux
options:
  bundleIdPrefix: com.curtisjm
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      ENABLE_TESTABILITY: YES

packages:
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh
    from: "0.12.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  MobileMux:
    type: application
    platform: iOS
    sources:
      - MobileMux
    settings:
      base:
        INFOPLIST_FILE: MobileMux/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.curtisjm.MobileMux
        PRODUCT_NAME: MobileMux
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        ALWAYS_SEARCH_USER_PATHS: false
    dependencies:
      - package: swift-nio-ssh
        product: NIOSSH
      - package: SwiftTerm
    scheme:
      testTargets:
        - MobileMuxTests
      test:
        config: Debug

  MobileMuxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MobileMuxTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: MobileMuxTests
        PRODUCT_BUNDLE_IDENTIFIER: com.curtisjm.MobileMuxTests
        ALWAYS_SEARCH_USER_PATHS: false
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MobileMux.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MobileMux"
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies:
      - target: MobileMux
